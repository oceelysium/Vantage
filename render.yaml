services:
  - type: web
    name: vantage
    runtime: static
    buildCommand: bun install && bun run --filter @draftgap/frontend-v2 build
    staticPublishPath: apps/frontend-v2/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: BUN_VERSION
        value: "1.3.6"
      # Set in the Render dashboard. Host serving your soloqueue datasets.
      - key: VITE_DATASET_BASE_URL
        sync: false
      # Optional Google Analytics tag; leave unset to disable.
      - key: VITE_GA_TAG
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
